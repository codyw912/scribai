name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync development dependencies
        run: uv sync --group dev

      - name: Run test suite
        run: uv run -m pytest

      - name: Run benchmark/report integration test
        run: uv run -m pytest tests/test_integration_benchmark_flow.py

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build distributions
        run: uv build

      - name: Smoke test installed wheel
        env:
          SCRIBAI_HOME: ${{ runner.temp }}/scribai-home
        run: |
          uv tool run --from dist/*.whl scribai --help
          uv tool run --from dist/*.whl scribai doctor --preset passthrough --input samples/docs/mini_api.md
          uv tool run --from dist/*.whl scribai run --preset passthrough --input samples/docs/mini_api.md --run-id ci-smoke --output ${{ runner.temp }}/scribai-output
          uv tool run --from dist/*.whl scribai status --run-id ci-smoke

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: scribai-dist
          path: dist/*
