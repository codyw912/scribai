name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import pathlib
          import re

          pyproject = pathlib.Path('pyproject.toml').read_text(encoding='utf-8')
          match = re.search(r'^version\s*=\s*"([^"]+)"', pyproject, re.MULTILINE)
          if match is None:
              raise SystemExit('Could not find project version in pyproject.toml')

          package_version = match.group(1)
          tag_version = '${{ github.ref_name }}'.removeprefix('v')
          if package_version != tag_version:
              raise SystemExit(
                  f'Tag version {tag_version!r} does not match package version {package_version!r}'
              )
          print(f'Version check passed: {package_version}')
          PY

      - name: Build distributions
        run: uv build

      - name: Check distributions
        run: uvx twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
