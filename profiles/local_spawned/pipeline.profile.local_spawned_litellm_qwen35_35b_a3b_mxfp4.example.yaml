version: 1

artifacts:
  root: ./artifacts
  run_id: auto

backends:
  local_text:
    adapter: litellm
    topology: local_spawned
    provider: mlx_lm
    model_origin: local_weights
    base_url: http://127.0.0.1:8101
    inference_path: /v1/chat/completions
    health_path: /v1/models
    startup_timeout_s: 300
    command: mlx_lm.server --host 127.0.0.1 --port 8101 --model RepublicOfKorokke/Qwen3.5-35B-A3B-mlx-lm-mxfp4
    api_key: ""

roles:
  normalize_text:
    backend: local_text
    model: RepublicOfKorokke/Qwen3.5-35B-A3B-mlx-lm-mxfp4

stages:
  extract:
    enabled: true
  clean:
    enabled: true
  sectionize:
    enabled: true
    target_tokens: 3500
    overlap_tokens: 300
  normalize_map:
    enabled: true
    temperature: 0.0
    request_timeout_s: 1200
    max_output_tokens: 1024
  reduce:
    enabled: true
  validate:
    enabled: true
    fail_on_hard_errors: false
  export:
    enabled: true
    multi_file: true
