version: 1

artifacts:
  root: ./artifacts
  run_id: auto

backends:
  local_text:
    adapter: litellm
    topology: local_spawned
    provider: llama_cpp
    model_origin: local_weights
    base_url: http://127.0.0.1:8094
    inference_path: /v1/chat/completions
    health_path: /health
    startup_timeout_s: 1800
    command: llama-server --host 127.0.0.1 --port 8094 --model /Users/cody/.cache/huggingface/hub/models--unsloth--Qwen3.5-35B-A3B-GGUF/snapshots/48a163ef41a1f2e85beb1b7fdd3a7e55e91f19b8/Qwen3.5-35B-A3B-UD-Q4_K_XL.gguf --alias qwen3.5-35b-a3b-ud-q4_k_xl --ctx-size 8192 --n-predict 2048 --reasoning-budget 0 --chat-template-kwargs '{"enable_thinking":false}'
    api_key: ""

roles:
  normalize_text:
    backend: local_text
    model: qwen3.5-35b-a3b-ud-q4_k_xl

stages:
  extract:
    enabled: true
  clean:
    enabled: true
  sectionize:
    enabled: true
    target_tokens: 3500
    overlap_tokens: 300
  normalize_map:
    enabled: true
    temperature: 0.0
    request_timeout_s: 1800
    max_output_tokens: 1024
  reduce:
    enabled: true
  validate:
    enabled: true
    fail_on_hard_errors: false
  export:
    enabled: true
    multi_file: true
