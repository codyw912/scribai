version: 1

artifacts:
  root: ./artifacts
  run_id: auto

backends:
  remote_text:
    adapter: litellm
    topology: remote
    provider: cerebras
    model_origin: hosted_weights
    inference_path: /v1/chat/completions
    health_path: /v1/models
    startup_timeout_s: 30
    api_key: "${CEREBRAS_API_KEY}"

roles:
  normalize_text:
    backend: remote_text
    model: gpt-oss-120b

stages:
  extract:
    enabled: true
  clean:
    enabled: true
  sectionize:
    enabled: true
  normalize_map:
    enabled: true
    workers: 1
    temperature: 0.0
    reasoning_effort: low
    request_timeout_s: 900
  reduce:
    enabled: true
  validate:
    enabled: true
    fail_on_hard_errors: false
  export:
    enabled: true
    multi_file: true
