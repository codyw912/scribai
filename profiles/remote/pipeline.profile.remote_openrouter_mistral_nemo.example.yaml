version: 1

artifacts:
  root: ./artifacts
  run_id: auto

backends:
  remote_text:
    adapter: litellm
    topology: remote
    provider: openrouter
    model_origin: hosted_weights
    inference_path: /v1/chat/completions
    health_path: /v1/models
    startup_timeout_s: 30
    api_key: "${OPENROUTER_API_KEY}"

roles:
  normalize_text:
    backend: remote_text
    model: mistralai/mistral-nemo

stages:
  extract:
    enabled: true
  clean:
    enabled: true
  sectionize:
    enabled: true
  normalize_map:
    enabled: true
    temperature: 0.0
    request_timeout_s: 900
    max_output_tokens: 1024
    reasoning_effort: none
    reasoning_exclude: true
  reduce:
    enabled: true
  validate:
    enabled: true
    fail_on_hard_errors: false
  export:
    enabled: true
    multi_file: true
