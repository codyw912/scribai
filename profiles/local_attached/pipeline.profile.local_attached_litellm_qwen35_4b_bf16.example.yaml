version: 1

artifacts:
  root: ./artifacts
  run_id: auto

backends:
  text_backend:
    adapter: litellm
    topology: local_attached
    provider: lmstudio
    model_origin: local_weights
    base_url: http://127.0.0.1:8090
    inference_path: /v1/chat/completions
    health_path: /v1/models
    startup_timeout_s: 30
    api_key: ""

roles:
  normalize_text:
    backend: text_backend
    model: qwen3.5-4b

stages:
  extract:
    enabled: true
  clean:
    enabled: true
  sectionize:
    enabled: true
    target_tokens: 3500
    overlap_tokens: 300
  normalize_map:
    enabled: true
    temperature: 0.0
    request_timeout_s: 900
    max_output_tokens: 1024
  reduce:
    enabled: true
  validate:
    enabled: true
    fail_on_hard_errors: false
  export:
    enabled: true
    multi_file: true
