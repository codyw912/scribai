version: 1

artifacts:
  root: ./artifacts
  run_id: auto

# No roles/backends configured means normalize_map runs in passthrough mode.
stages:
  extract:
    enabled: true
  clean:
    enabled: true
  sectionize:
    enabled: true
    target_tokens: 5000
    overlap_tokens: 400
  normalize_map:
    enabled: true
    temperature: 0.0
    request_timeout_s: 600
  reduce:
    enabled: true
  validate:
    enabled: true
    fail_on_hard_errors: false
  export:
    enabled: true
    multi_file: true
